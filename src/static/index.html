<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAG Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ---------- Login Screen ---------- */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    #login-screen h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ffffff;
    }

    #login-screen p {
      font-size: 0.9rem;
      color: #888;
      text-align: center;
    }

    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #2a2a3a;
      background: #1a1a2e;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    #login-screen input:focus { border-color: #6c63ff; }

    #login-screen button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #6c63ff;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #login-screen button:hover { background: #574fd6; }

    /* ---------- Chat Screen ---------- */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 720px;
      height: 100vh;
      padding: 0;
    }

    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3a;
    }

    #chat-header .title { font-size: 1rem; font-weight: 700; color: #fff; }
    #chat-header .email-badge {
      font-size: 0.75rem;
      color: #aaa;
      background: #2a2a3a;
      padding: 4px 10px;
      border-radius: 20px;
    }

    #chat-header button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    #chat-header button:hover { color: #fff; }

    /* ---------- Messages ---------- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a3a transparent;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: #6c63ff;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: #1e1e30;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2a3a;
    }

    .sources {
      font-size: 0.72rem;
      color: #666;
      margin-top: 4px;
      padding: 0 4px;
    }

    /* ---------- Typing indicator ---------- */
    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: #6c63ff;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ---------- Input bar ---------- */
    #input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: #1a1a2e;
      border-top: 1px solid #2a2a3a;
    }

    #input-bar textarea {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #2a2a3a;
      background: #0f1117;
      color: #fff;
      font-size: 0.92rem;
      resize: none;
      outline: none;
      height: 46px;
      max-height: 120px;
      overflow-y: auto;
      transition: border 0.2s;
      font-family: inherit;
      line-height: 1.4;
    }

    #input-bar textarea:focus { border-color: #6c63ff; }

    #send-btn {
      padding: 0 18px;
      border-radius: 10px;
      border: none;
      background: #6c63ff;
      color: #fff;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #send-btn:hover { background: #574fd6; }
    #send-btn:disabled { background: #3a3a5a; cursor: not-allowed; }

    /* ---------- Error toast ---------- */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #e05555;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
      z-index: 99;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <h1>🤖 RAG Chatbot</h1>
    <p>Enter your email to start chatting. Your conversation history is saved.</p>
    <input id="email-input" type="email" placeholder="you@example.com" />
    <button onclick="startChat()">Start Chatting</button>
  </div>

  <!-- Chat -->
  <div id="chat-screen">
    <div id="chat-header">
      <span class="title">🤖 RAG Chatbot</span>
      <span class="email-badge" id="header-email"></span>
      <button onclick="logout()">← Switch user</button>
    </div>
    <div id="messages"></div>
    <div id="input-bar">
      <textarea id="question-input" placeholder="Ask a question..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">&#9650;</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    let userEmail = "";

    // ---------- Login ----------
    function startChat() {
      const email = document.getElementById("email-input").value.trim();
      if (!email || !email.includes("@")) {
        showToast("Please enter a valid email.");
        return;
      }
      userEmail = email;
      document.getElementById("header-email").textContent = email;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("chat-screen").style.display = "flex";
      loadHistory();
    }

    function logout() {
      userEmail = "";
      document.getElementById("messages").innerHTML = "";
      document.getElementById("email-input").value = "";
      document.getElementById("chat-screen").style.display = "none";
      document.getElementById("login-screen").style.display = "flex";
    }

    // ---------- Load history on login ----------
    async function loadHistory() {
      try {
        const res = await fetch(`/api/history/email/${encodeURIComponent(userEmail)}`);
        if (res.status === 404) return; // new user, no history
        if (!res.ok) return;
        const messages = await res.json();
        messages.forEach(m => appendBubble(m.role === "user" ? "user" : "bot", m.content));
        scrollToBottom();
      } catch (e) { /* silently skip */ }
    }

    // ---------- Send message ----------
    async function sendMessage() {
      const input = document.getElementById("question-input");
      const question = input.value.trim();
      if (!question) return;

      appendBubble("user", question);
      input.value = "";
      input.style.height = "46px";

      const typingEl = appendTyping();
      const sendBtn = document.getElementById("send-btn");
      sendBtn.disabled = true;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: userEmail, question }),
        });

        typingEl.remove();

        if (!res.ok) {
          const err = await res.json();
          showToast(err.detail || "Something went wrong.");
          return;
        }

        const data = await res.json();
        appendBubble("bot", data.answer, data.sources);
      } catch (e) {
        typingEl.remove();
        showToast("Network error. Is the server running?");
      } finally {
        sendBtn.disabled = false;
        scrollToBottom();
      }
    }

    // ---------- Helpers ----------
    function appendBubble(role, text, sources = []) {
      const msgs = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      div.appendChild(bubble);

      if (sources.length > 0) {
        const src = document.createElement("div");
        src.className = "sources";
        src.textContent = "Sources: " + sources.map(s => s.split(/[\\/]/).pop()).join(", ");
        div.appendChild(src);
      }

      msgs.appendChild(div);
      scrollToBottom();
      return div;
    }

    function appendTyping() {
      const msgs = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = "msg bot typing";
      div.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
      msgs.appendChild(div);
      scrollToBottom();
      return div;
    }

    function scrollToBottom() {
      const msgs = document.getElementById("messages");
      msgs.scrollTop = msgs.scrollHeight;
    }

    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 3000);
    }

    // Send on Enter (Shift+Enter for new line)
    document.addEventListener("DOMContentLoaded", () => {
      const ta = document.getElementById("question-input");
      ta.addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      // Auto-grow textarea
      ta.addEventListener("input", () => {
        ta.style.height = "46px";
        ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
      });

      // Allow Enter on email input
      document.getElementById("email-input").addEventListener("keydown", e => {
        if (e.key === "Enter") startChat();
      });
    });
  </script>
</body>
</html>
